<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — Climora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#a855f7">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-512.png') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .dashboard-container { padding: 3rem 2rem; max-width: 1400px; margin: 0 auto; }
        .settings-card { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: var(--border-radius); padding: 2.5rem; backdrop-filter: blur(10px); box-shadow: var(--card-shadow); margin-bottom: 2rem; }
        .card-title { font-size: 1.5rem; font-weight: 800; color: white; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
        .input-box { width: 100%; padding: 1rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 1rem; color: white; font-family: monospace; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 0; border-bottom: 1px solid var(--glass-border); }
        .setting-item:last-child { border-bottom: none; }
        .setting-info h4 { font-size: 1.1rem; color: white; margin-bottom: 4px; }
        .setting-info p { font-size: 0.85rem; color: var(--text-secondary); }
        .selector { background: #1a1a1a; color: white; border: 1px solid var(--glass-border); padding: 0.5rem 1rem; border-radius: 0.75rem; }
        @media (max-width: 768px) {
            .dashboard-container { padding: 1.5rem 1rem; padding-bottom: 5rem; }
            .settings-card { padding: 1.5rem; }
            .setting-item { flex-direction: column; align-items: stretch; gap: 1rem; }
            .selector { width: 100%; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand" style="display: none !important;">
            Climora
        </a>
        <div class="nav-links">
            <a href="/">Overview</a>
            <a href="/climate">Heat Analysis</a>
            <a href="/aqi">AQI & Pollutants</a>
            <a href="/map">Vulnerability Map</a>
            <a href="/settings" class="active">Settings</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header" style="margin-bottom: 3rem;">
            <h1 style="font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; background: linear-gradient(to right, #ffffff, #a855f7); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">System Settings</h1>
            <p style="color: var(--text-secondary); font-size: 1.25rem; font-weight: 500;">Configure API collection, data processing, and dashboard preferences</p>
        </div>

        <div class="settings-card">
            <div class="card-title"><i class="ph ph-broadcast" style="color: #f59e0b;"></i> Monitored Regions</div>
            <div id="region-list" style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
                {% for city in cities %}
                <span class="badge" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.8rem;">{{ city }}</span>
                {% endfor %}
                <button onclick="addRegion()" class="badge" style="background:rgba(168, 85, 247, 0.1); color: var(--accent-purple); border: 1px dashed var(--accent-purple); cursor:pointer; padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.8rem; font-weight: 800;">+ Add Region</button>
            </div>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem; margin-bottom: 4rem;">
            <button onclick="saveSettings()" class="btn-primary" style="padding: 1rem 2rem; border-radius: 1rem;">Save Settings</button>
            <button onclick="resetDataset()" class="btn-secondary" style="padding: 1rem 2rem; border-radius: 1rem; border-color: #ef4444; color: #ef4444;">Reset Dataset</button>
        </div>
    </div>

    <div class="refresh-indicator">
        <div class="pulse-dot"></div>
        <span id="last-updated">System Active</span>
    </div>

    <script>
        function addRegion() {
            const city = prompt("Enter the name of the region/city to monitor:");
            if (city && city.trim() !== "") {
                const list = document.getElementById('region-list');
                const btn = list.querySelector('button');
                const span = document.createElement('span');
                span.className = 'badge';
                span.style.cssText = "background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.8rem; animation: fadeIn 0.5s ease;";
                span.innerText = city.trim();
                list.insertBefore(span, btn);
                showNotification(`Region ${city} added to monitoring queue.`);
            }
        }

        function saveSettings() {
            showNotification("Settings saved successfully!", "success");
        }

        function resetDataset() {
            if(confirm("Are you sure you want to reset the local climate dataset?")) {
                showNotification("Dataset reset initiated...", "warning");
            }
        }

        function showNotification(msg, type="success") {
            const lastUpdated = document.getElementById('last-updated');
            lastUpdated.innerText = msg;
            setTimeout(() => { lastUpdated.innerText = "System Active"; }, 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Register Service Worker for PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register("{{ url_for('static', filename='js/sw.js') }}")
                .then(() => console.log("Service Worker Registered"))
                .catch(err => console.error("Service Worker Failed", err));
            }
        });
    </script>
    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav" style="display: none;">
        <a href="/">
            <i class="ph-bold ph-house"></i>
            <span>Overview</span>
        </a>
        <a href="/climate">
            <i class="ph-bold ph-thermometer"></i>
            <span>Heat</span>
        </a>
        <a href="/aqi">
            <i class="ph-bold ph-wind"></i>
            <span>AQI</span>
        </a>
        <a href="/map">
            <i class="ph-bold ph-map-trifold"></i>
            <span>Map</span>
        </a>
        <a href="/settings" class="active">
            <i class="ph-bold ph-gear"></i>
            <span>Settings</span>
        </a>
    </nav>
</body>
</html>
