<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climora — Urban Heat Vulnerability Clustering</title>
    <meta name="description" content="AI-powered K-Means clustering analysis for urban heat vulnerability assessment across Indian cities.">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#3B82F6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-512.png') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        @media (max-width: 768px) {
            #scatter-chart, #temp-aqi-chart { height: 350px !important; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="brand" style="display: none !important;">Climora</a>
        <div class="nav-links">
            <a href="/">Overview</a>
            <a href="/climate" class="active">Heat Analysis</a>
            <a href="/aqi">AQI & Pollutants</a>
            <a href="/map">Vulnerability Map</a>
            <a href="/settings">Settings</a>
        </div>
    </nav>

    <div class="dashboard-container">
        
        <div class="city-header">
            <div class="city-title">
                <h1 id="ui-city-name">Heat Vulnerability Analysis</h1>
                <p id="ui-condition">AI Clustering Engine</p>
            </div>
            <div class="search-mini">
                <input type="text" id="city-search" placeholder="Enter city name..." autocomplete="off">
                <button onclick="searchCity()" class="btn-primary">Analyze</button>
            </div>
        </div>

        <div id="error-container"></div>

        <div class="metrics-grid" style="grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));">
            <div class="metric-card">
                <i class="ph-fill ph-brain metric-icon" style="color:#6366f1; background: rgba(99, 102, 241, 0.08);"></i>
                <div class="metric-data">
                    <h3>AI System Status</h3>
                    <p>Live</p>
                </div>
            </div>
            <div class="metric-card">
                <i class="ph-fill ph-city metric-icon" style="color:#3B82F6; background: rgba(59, 130, 246, 0.08);"></i>
                <div class="metric-data">
                    <h3>Cities Analyzed</h3>
                    <p id="ui-analyzed">--</p>
                </div>
            </div>
            <div class="metric-card">
                <i class="ph-fill ph-warning-circle metric-icon" style="color:#EF4444; background: rgba(239, 68, 68, 0.08);"></i>
                <div class="metric-data">
                    <h3>High Risk Zones</h3>
                    <p id="ui-high-risk">--</p>
                </div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-section">
                <div id="scatter-chart" style="width:100%; height:550px;"></div>
            </div>
            <div class="chart-section">
                <div id="temp-aqi-chart" style="width:100%; height:550px;"></div>
            </div>
        </div>

    </div>

    <div class="refresh-indicator">
        <div class="pulse-dot"></div>
        <span id="last-updated">Syncing...</span>
    </div>

    <script>
        async function fetchClusteringData() {
            try {
                const response = await fetch('/api/live/clustering');
                const result = await response.json();
                
                if (result.status === 'success') {
                    document.getElementById('error-container').innerHTML = '';
                    updateUI(result.data, result.timestamp);
                } else {
                    showError(result.message);
                }
            } catch (error) {
                console.error(error);
                showError("Connection lost. Retrying...");
            }
        }

        function updateUI(data, timestamp) {
            document.getElementById('ui-analyzed').textContent = data.total_analyzed;
            document.getElementById('ui-high-risk').textContent = data.high_risk_count;
            document.getElementById('last-updated').textContent = `Live Model • Updated ${timestamp}`;
            
            Plotly.react('scatter-chart', data.scatter_chart.data, data.scatter_chart.layout, {responsive: true});
            Plotly.react('temp-aqi-chart', data.temp_aqi_chart.data, data.temp_aqi_chart.layout, {responsive: true});
        }

        function showError(msg) {
            document.getElementById('error-container').innerHTML = `<div class="error-state" style="background:rgba(239,68,68,0.06); border:1px solid rgba(239,68,68,0.15); border-radius:1rem; padding:1.25rem; margin-bottom:1.5rem;"><i class="ph-fill ph-warning-circle"></i> ${msg}</div>`;
            document.getElementById('last-updated').textContent = "Error";
        }

        function searchCity() {
            const query = document.getElementById('city-search').value;
            if (query.trim() !== '') {
                window.location.href = `/climate?city=${encodeURIComponent(query)}`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchClusteringData();
            setInterval(fetchClusteringData, 10000);

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register("{{ url_for('static', filename='js/sw.js') }}")
                .then(() => console.log("Service Worker Registered"))
                .catch(err => console.error("Service Worker Failed", err));
            }
        });
    </script>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav" style="display: none;">
        <a href="/"><i class="ph-bold ph-house"></i><span>Overview</span></a>
        <a href="/climate" class="active"><i class="ph-bold ph-thermometer"></i><span>Heat</span></a>
        <a href="/aqi"><i class="ph-bold ph-wind"></i><span>AQI</span></a>
        <a href="/map"><i class="ph-bold ph-map-trifold"></i><span>Map</span></a>
        <a href="/settings"><i class="ph-bold ph-gear"></i><span>Settings</span></a>
    </nav>
</body>
</html>
